<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a73e8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>MatchMaker - 杯赛助手</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏆</text></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- ─── Header ──────────────────────────────────────── -->
    <header class="header">
      <h1>🏆 MatchMaker</h1>
      <p class="subtitle">每周杯赛助手</p>
    </header>

    <!-- ═══════════════════════════════════════════════════ -->
    <!-- VIEW: HOME                                           -->
    <!-- ═══════════════════════════════════════════════════ -->
    <section class="view" id="view-home">
      <div class="card">
        <h2>主页</h2>
        <div id="home-stats" class="home-stats"></div>
        <button class="btn-primary" id="btn-start-event">开始本周比赛</button>
        <div class="btn-row">
          <button class="btn-secondary" id="btn-goto-db">选手数据库</button>
          <button class="btn-secondary" id="btn-goto-history">历史记录</button>
        </div>
        <button class="btn-text full-width" id="btn-resume-event" style="display:none;">继续上次未完成的比赛 →</button>
      </div>

      <div class="card" id="home-leaderboard-card">
        <div class="tab-bar">
          <button class="tab-btn active" data-tab="points">积分榜</button>
          <button class="tab-btn" data-tab="winrate">胜率榜</button>
        </div>
        <div id="home-leaderboard"></div>
      </div>
    </section>

    <!-- ═══════════════════════════════════════════════════ -->
    <!-- VIEW: PLAYER DATABASE                                -->
    <!-- ═══════════════════════════════════════════════════ -->
    <section class="view hidden" id="view-db">
      <div class="card">
        <div class="view-header">
          <button class="btn-back" data-goto="home">← 返回</button>
          <h2>选手数据库</h2>
        </div>

        <div class="form-group">
          <label>添加选手</label>
          <div class="inline-input">
            <input type="text" id="new-player-name" placeholder="输入姓名">
            <button class="btn-small" id="btn-add-player">添加</button>
          </div>
        </div>

        <div id="db-player-list"></div>

        <div class="io-section">
          <h3>数据导入 / 导出</h3>
          <div class="btn-row">
            <button class="btn-secondary" id="btn-export">📤 导出 JSON</button>
            <button class="btn-secondary" id="btn-import">📥 导入 JSON</button>
          </div>
          <input type="file" id="import-file" accept=".json,application/json" style="display:none;">
          <div class="hint">导出包含全部选手、比赛历史和未完成比赛。导入会覆盖现有数据。</div>
        </div>
      </div>
    </section>

    <!-- ═══════════════════════════════════════════════════ -->
    <!-- VIEW: HISTORY                                        -->
    <!-- ═══════════════════════════════════════════════════ -->
    <section class="view hidden" id="view-history">
      <div class="card">
        <div class="view-header">
          <button class="btn-back" data-goto="home">← 返回</button>
          <h2>历史记录</h2>
        </div>
        <div id="history-list"></div>
      </div>
    </section>

    <!-- ═══════════════════════════════════════════════════ -->
    <!-- VIEW: EVENT SETUP                                    -->
    <!-- ═══════════════════════════════════════════════════ -->
    <section class="view hidden" id="view-setup">
      <div class="card">
        <div class="view-header">
          <button class="btn-back" data-goto="home">← 返回</button>
          <h2>本周比赛设置</h2>
        </div>

        <div class="form-group">
          <label>1. 选择本周参赛选手</label>
          <div class="hint">已选 <span id="attendee-count">0</span> 人</div>
          <div id="attendee-list" class="attendee-list"></div>
          <div class="inline-input" style="margin-top:8px;">
            <input type="text" id="quick-add-player" placeholder="快速添加新选手">
            <button class="btn-small" id="btn-quick-add">添加</button>
          </div>
        </div>

        <div class="form-group">
          <label>2. 比赛参数</label>
          <div class="form-row">
            <div class="form-group">
              <label class="label-sub">每队人数</label>
              <input type="number" id="team-size" value="2" min="1" max="11">
            </div>
            <div class="form-group">
              <label class="label-sub">场地数</label>
              <input type="number" id="num-courts" value="2" min="1" max="20">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="label-sub">每场时长（分）</label>
              <input type="number" id="match-duration" value="15" min="1" max="300">
            </div>
            <div class="form-group">
              <label class="label-sub">总时间（分）</label>
              <input type="number" id="total-time" value="180" min="1" max="1440">
            </div>
          </div>
        </div>

        <button class="btn-primary" id="btn-form-teams">生成队伍</button>
      </div>
    </section>

    <!-- ═══════════════════════════════════════════════════ -->
    <!-- VIEW: TEAM REVIEW                                    -->
    <!-- ═══════════════════════════════════════════════════ -->
    <section class="view hidden" id="view-teams">
      <div class="card">
        <div class="view-header">
          <button class="btn-back" data-goto="setup">← 返回</button>
          <h2>队伍分组</h2>
        </div>

        <div class="hint" id="teams-hint"></div>
        <div id="teams-display"></div>

        <div class="form-row" style="margin-top:12px;">
          <button class="btn-secondary" id="btn-reshuffle">🔄 重新随机</button>
          <button class="btn-secondary" id="btn-swap-mode">🔀 手动调整</button>
        </div>

        <div class="card-inner" id="format-preview"></div>

        <button class="btn-primary" id="btn-start-tournament">开始比赛</button>
      </div>
    </section>

    <!-- ═══════════════════════════════════════════════════ -->
    <!-- VIEW: TOURNAMENT                                     -->
    <!-- ═══════════════════════════════════════════════════ -->
    <section class="view hidden" id="view-tournament">
      <div class="card">
        <div class="view-header">
          <button class="btn-back" data-goto="home">← 返回主页</button>
          <h2>比赛进行中</h2>
        </div>

        <div id="tournament-progress" class="tournament-progress"></div>
        <div id="tournament-schedule"></div>

        <button class="btn-primary hidden" id="btn-finish-tournament">完成比赛 & 更新积分</button>
      </div>
    </section>

    <!-- ═══════════════════════════════════════════════════ -->
    <!-- VIEW: DONE                                           -->
    <!-- ═══════════════════════════════════════════════════ -->
    <section class="view hidden" id="view-done">
      <div class="card">
        <h2>🎉 比赛结束</h2>
        <div id="done-summary"></div>
        <button class="btn-primary" id="btn-done-home">返回主页</button>
      </div>
    </section>
  </div>

  <script src="storage.js"></script>
  <script src="scheduler.js"></script>
  <script src="app.js"></script>
</body>
</html>
